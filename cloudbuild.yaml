steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'dentaloneiq-beta'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta:$SHORT_SHA'
      - '--region'
      - 'us-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/dentaloneiq/dentaloneiq-beta:latest'

substitutions:
  _REGION: 'us-east1'

options:
  logging: CLOUD_LOGGING_ONLY
