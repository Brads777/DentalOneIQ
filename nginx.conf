server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # Health check endpoint for Cloud Run
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '<!DOCTYPE html><html><head><title>404 - Not Found</title><style>body{font-family:Inter,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f8fafc;color:#1e293b;text-align:center}h1{font-size:4rem;color:#0ea5e9}p{margin-top:1rem;color:#64748b}</style></head><body><div><h1>404</h1><p>Page not found</p><p><a href="/" style="color:#0ea5e9">Back to DentalOneIQ</a></p></div></body></html>';
        add_header Content-Type text/html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 '<!DOCTYPE html><html><head><title>Server Error</title><style>body{font-family:Inter,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f8fafc;color:#1e293b;text-align:center}h1{font-size:4rem;color:#ef4444}p{margin-top:1rem;color:#64748b}</style></head><body><div><h1>500</h1><p>Something went wrong. Please try again.</p></div></body></html>';
        add_header Content-Type text/html;
    }
}
